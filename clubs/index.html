<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealDutch Clubs - Advanced Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0B1026, #1A1F3D);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8892b0;
            font-size: 1.2rem;
        }

        /* Clubs Grid */
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .club-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .club-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .club-card.selected {
            border: 2px solid #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        .club-tier {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
        }

        .club-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: white;
            padding-right: 50px;
        }

        .club-tag {
            color: #FFD700;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
        }

        .club-description {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .stats-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-preview {
            text-align: center;
        }

        .stat-preview-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD700;
        }

        .stat-preview-label {
            font-size: 0.8rem;
            color: #8892b0;
        }

        .mega-pig-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
        }

        .mega-pig-icons {
            display: flex;
            gap: 5px;
            font-size: 1.3rem;
        }

        .pig-filled {
            color: #FF69B4;
            filter: drop-shadow(0 0 5px #FF69B4);
        }

        .pig-empty {
            color: #4a4a6a;
        }

        .mega-pig-text {
            color: #FF69B4;
            font-weight: bold;
        }

        /* Sort Controls */
        .sort-controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sort-label {
            color: #8892b0;
            font-weight: 600;
        }

        .sort-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .sort-btn:hover {
            background: rgba(255,215,0,0.2);
            border-color: #FFD700;
        }

        .sort-btn.active {
            background: #FFD700;
            color: #0B1026;
            border-color: #FFD700;
        }

        .sort-direction {
            margin-left: 5px;
        }

        /* Detail Panel */
        .detail-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            display: none;
        }

        .detail-panel.active {
            display: block;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .detail-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .detail-badge {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .detail-tag {
            font-family: monospace;
            font-size: 1.3rem;
            color: #8892b0;
            background: rgba(255,215,0,0.1);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .detail-type {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 30px;
            color: #FFD700;
        }

        .detail-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-stat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .detail-stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 5px;
        }

        .detail-stat-label {
            color: #8892b0;
            font-size: 0.9rem;
        }

        .members-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .members-header h3 {
            color: #FFD700;
            font-size: 1.5rem;
        }

        .member-count {
            background: rgba(255,215,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            color: #FFD700;
        }

        .member-sort-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .member-sort-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .member-sort-btn:hover {
            background: rgba(255,215,0,0.2);
        }

        .member-sort-btn.active {
            background: #FFD700;
            color: #0B1026;
        }

        .members-table {
            width: 100%;
            border-collapse: collapse;
        }

        .members-table th {
            text-align: left;
            padding: 15px;
            color: #8892b0;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            cursor: pointer;
            transition: color 0.3s;
        }

        .members-table th:hover {
            color: #FFD700;
        }

        .members-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .role-president { background: #e74c3c; color: white; }
        .role-vicePresident { background: #f39c12; color: white; }
        .role-senior { background: #9b59b6; color: white; }
        .role-member { background: #3498db; color: white; }

        .prestige-badge {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            display: inline-block;
        }

        .ratio-good {
            color: #2ecc71;
            font-weight: bold;
        }

        .ratio-bad {
            color: #e74c3c;
            font-weight: bold;
        }

        .ratio-neutral {
            color: #f39c12;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading-spinner {
            border: 4px solid rgba(255,215,0,0.1);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .club-name { font-size: 1.5rem; }
            .detail-title { font-size: 1.8rem; }
            .members-table { font-size: 0.9rem; }
            .members-table td { padding: 8px 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 RealDutch Familie</h1>
            <p class="subtitle">Advanced stats - Prestige, 3v3 wins, Showdown wins & ratio</p>
        </header>

        <!-- Clubs Grid -->
        <div class="clubs-grid" id="clubsGrid"></div>

        <!-- Club Sort Controls -->
        <div class="sort-controls">
            <span class="sort-label">Sorteer clubs op:</span>
            <div class="sort-buttons">
                <button class="sort-btn" onclick="sortClubs('tier')">Tier</button>
                <button class="sort-btn" onclick="sortClubs('name')">Naam</button>
                <button class="sort-btn" onclick="sortClubs('trophies')">Trophies</button>
                <button class="sort-btn" onclick="sortClubs('megaPig')">Mega Pig</button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Club gegevens laden...</p>
        </div>

        <!-- Error -->
        <div class="error-message" id="error"></div>

        <!-- Detail Panel -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <h2 class="detail-title" id="detailClubName"></h2>
                <div class="detail-badge">
                    <span class="detail-tag" id="detailClubTag"></span>
                    <span class="detail-type" id="detailClubType"></span>
                </div>
            </div>

            <div class="detail-stats-grid">
                <div class="detail-stat-box">
                    <div class="detail-stat-value" id="detailTrophies">-</div>
                    <div class="detail-stat-label">Totaal Trophies</div>
                </div>
                <div class="detail-stat-box">
                    <div class="detail-stat-value" id="detailRequired">-</div>
                    <div class="detail-stat-label">Vereiste Trophies</div>
                </div>
                <div class="detail-stat-box">
                    <div class="detail-stat-value" id="detailMembers">-</div>
                    <div class="detail-stat-label">Leden</div>
                </div>
                <div class="detail-stat-box">
                    <div class="detail-stat-value" id="detailAverage">-</div>
                    <div class="detail-stat-label">Gem. Trophies</div>
                </div>
            </div>

            <div class="members-section">
                <div class="members-header">
                    <h3>👥 Leden stats</h3>
                    <span class="member-count" id="memberCountDisplay"></span>
                    <div class="member-sort-controls" id="memberSortControls">
                        <button class="member-sort-btn active" onclick="sortMembers('trophies')">🏆 Trophies</button>
                        <button class="member-sort-btn" onclick="sortMembers('prestige')">⭐ Prestige</button>
                        <button class="member-sort-btn" onclick="sortMembers('ratio')">📊 Ratio (3v3/SD)</button>
                        <button class="member-sort-btn" onclick="sortMembers('name')">🔤 Naam</button>
                    </div>
                </div>
                <table class="members-table">
                    <thead>
                        <tr>
                            <th onclick="sortMembers('name')">Naam</th>
                            <th onclick="sortMembers('role')">Rol</th>
                            <th onclick="sortMembers('trophies')">🏆 Trophies</th>
                            <th onclick="sortMembers('prestige')">⭐ Prestige</th>
                            <th onclick="sortMembers('3vs3')">3v3 Wins</th>
                            <th onclick="sortMembers('sd')">Showdown Wins</th>
                            <th onclick="sortMembers('ratio')">📊 Ratio (3v3/SD)</th>
                        </tr>
                    </thead>
                    <tbody id="membersList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.realdutch.club';
        let currentClubTag = null;
        let currentMembers = [];
        let currentSort = {
            field: 'trophies',
            direction: 'desc'
        };
        
        // Club data uit jouw lijst met alle RD clubs
        const clubs = [
            { name: 'RealDutch', tag: '28U982', tier: 'S', megaPig: 5, trophies: '95k', description: 'Hoofdclub van de RealDutch familie' },
            { name: 'RealDutch II', tag: '20QGP08R0', tier: 'A+', megaPig: 5, trophies: '90k', description: 'Tweede club' },
            { name: 'RealDutch Elite', tag: '2GQU92GV8', tier: 'A', megaPig: 5, trophies: '85k', description: 'Elite club' },
            { name: 'RealDutch Force', tag: '2008QRUP0', tier: 'B', megaPig: 5, trophies: '80k', description: 'Force club' },
            { name: 'RealDutch Glory', tag: '2GU8VJVYU', tier: 'B', megaPig: 5, trophies: '87k', description: 'Glory club' },
            { name: 'RealDutch Stars', tag: '2PGG8GJRC', tier: 'B', megaPig: 5, trophies: '75k', description: 'Stars club' },
            { name: 'RealDutch Light', tag: '2GV0UGG8Y', tier: 'C', megaPig: 5, trophies: '55k', description: 'Light club' },
            { name: 'RealDutch Nova', tag: '2GV0UGG8Y', tier: 'C', megaPig: 0, trophies: '25k', description: 'Nova club' },
            { name: 'RealDutch Minis', tag: '2RY829PPO', tier: 'C', megaPig: 0, trophies: 'N/A', description: 'Mini accounts' },
            { name: 'RealDutch Mini2', tag: '2RY829PPO', tier: 'C', megaPig: 0, trophies: 'N/A', description: 'Mini accounts 2' },
            { name: 'RealDutch OG', tag: '2CU9G0Q0V', tier: 'F', megaPig: 0, trophies: 'N/A', description: 'Original gangsters' }
        ];

        // Tier kleuren
        const tierColors = {
            'S': '#FFD700',
            'A+': '#C0C0C0',
            'A': '#C0C0C0',
            'B': '#CD7F32',
            'C': '#3498db',
            'F': '#8B4513'
        };

        // Clubs weergeven
        function displayClubs() {
            const grid = document.getElementById('clubsGrid');
            grid.innerHTML = '';

            clubs.forEach(club => {
                const card = document.createElement('div');
                card.className = 'club-card';
                card.onclick = () => selectClub(club);

                // Mega Pig icons
                let pigIcons = '';
                for (let i = 0; i < 5; i++) {
                    pigIcons += i < club.megaPig ? 
                        '<span class="pig-filled">🐷</span>' : 
                        '<span class="pig-empty">⬛</span>';
                }

                card.innerHTML = `
                    <div class="club-tier" style="color: ${tierColors[club.tier]};">${club.tier}</div>
                    <div class="club-name">${club.name}</div>
                    <div class="club-tag">#${club.tag}</div>
                    <div class="club-description">${club.description}</div>
                    <div class="stats-preview">
                        <div class="stat-preview">
                            <div class="stat-preview-value">${club.trophies}</div>
                            <div class="stat-preview-label">Trophies</div>
                        </div>
                        <div class="stat-preview">
                            <div class="stat-preview-value">${club.megaPig}/5</div>
                            <div class="stat-preview-label">Mega Pig</div>
                        </div>
                    </div>
                    <div class="mega-pig-container">
                        <div class="mega-pig-icons">${pigIcons}</div>
                        <div class="mega-pig-text">${club.megaPig === 5 ? 'COMPLETE' : club.megaPig === 0 ? 'GEEN' : ''}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // Clubs sorteren
        function sortClubs(criteria) {
            // Update active button
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Sort clubs
            clubs.sort((a, b) => {
                if (criteria === 'tier') {
                    const tierOrder = { 'S': 6, 'A+': 5, 'A': 4, 'B': 3, 'C': 2, 'F': 1 };
                    return tierOrder[b.tier] - tierOrder[a.tier];
                } else if (criteria === 'name') {
                    return a.name.localeCompare(b.name);
                } else if (criteria === 'trophies') {
                    if (a.trophies === 'N/A') return 1;
                    if (b.trophies === 'N/A') return -1;
                    return parseInt(b.trophies) - parseInt(a.trophies);
                } else if (criteria === 'megaPig') {
                    return b.megaPig - a.megaPig;
                }
            });

            displayClubs();
        }

        // Club selecteren en details laden
        async function selectClub(club) {
            // Remove selected class from all cards
            document.querySelectorAll('.club-card').forEach(c => c.classList.remove('selected'));
            
            // Add selected class to clicked card
            event.currentTarget.classList.add('selected');

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('detailPanel').classList.remove('active');
            document.getElementById('error').style.display = 'none';

            currentClubTag = club.tag;

            try {
                // Haal LIVE club data op van API
                const response = await fetch(`${API_BASE}/api/club?tag=${club.tag}`);
                const clubData = await response.json();

                if (!response.ok) {
                    throw new Error('Club data niet beschikbaar');
                }

                // Haal voor elk lid de speler data op voor wins en prestige
                const memberPromises = clubData.members.map(async (member) => {
                    try {
                        const playerResponse = await fetch(`${API_BASE}/api/player?tag=${member.tag}`);
                        if (playerResponse.ok) {
                            const playerData = await playerResponse.json();
                            
                            // Bereken ratio (3v3 wins / showdown wins)
                            const soloWins = playerData.soloVictories || 0;
                            const duoWins = playerData.duoVictories || 0;
                            const showdownWins = soloWins + duoWins;
                            const teamWins = playerData['3vs3Victories'] || 0;
                            const ratio = showdownWins > 0 ? (teamWins / showdownWins).toFixed(2) : teamWins > 0 ? '∞' : '0';
                            
                            return {
                                ...member,
                                playerData: {
                                    totalPrestige: playerData.totalPrestigeLevel || 0,
                                    soloWins: soloWins,
                                    duoWins: duoWins,
                                    teamWins: teamWins,
                                    showdownWins: showdownWins,
                                    ratio: ratio
                                }
                            };
                        }
                    } catch (e) {
                        console.error('Error fetching player data:', e);
                    }
                    return {
                        ...member,
                        playerData: {
                            totalPrestige: 0,
                            soloWins: 0,
                            duoWins: 0,
                            teamWins: 0,
                            showdownWins: 0,
                            ratio: '0'
                        }
                    };
                });

                const membersWithData = await Promise.all(memberPromises);
                currentMembers = membersWithData;

                // Toon ALLE club data
                document.getElementById('detailClubName').textContent = clubData.name;
                document.getElementById('detailClubTag').textContent = `#${clubData.tag}`;
                document.getElementById('detailClubType').textContent = clubData.type || 'onbekend';
                
                // Stats
                const totalTrophies = clubData.trophies || 0;
                const memberCount = clubData.members?.length || 0;
                const requiredTrophies = clubData.requiredTrophies || 0;
                const avgTrophies = memberCount > 0 ? Math.round(totalTrophies / memberCount) : 0;
                
                document.getElementById('detailTrophies').textContent = totalTrophies.toLocaleString();
                document.getElementById('detailRequired').textContent = requiredTrophies.toLocaleString();
                document.getElementById('detailMembers').textContent = memberCount;
                document.getElementById('detailAverage').textContent = avgTrophies.toLocaleString();
                document.getElementById('memberCountDisplay').textContent = `${memberCount} leden`;

                // Toon leden met stats
                displayMembers(currentMembers);

                // Toon detail panel
                document.getElementById('detailPanel').classList.add('active');
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Kon club gegevens niet laden. Probeer het later opnieuw.';
                console.error('Error:', error);
            }
        }

        // Leden weergeven met stats
        function displayMembers(members) {
            const membersList = document.getElementById('membersList');
            membersList.innerHTML = '';

            if (members.length === 0) {
                membersList.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">Geen leden gevonden</td></tr>';
                return;
            }

            // Sorteer leden
            const sortedMembers = sortMembersArray(members, currentSort.field, currentSort.direction);

            sortedMembers.forEach(member => {
                const row = document.createElement('tr');

                let roleClass = 'role-member';
                let roleText = member.role || 'member';
                
                if (roleText === 'president') {
                    roleClass = 'role-president';
                    roleText = 'President';
                } else if (roleText === 'vicePresident') {
                    roleClass = 'role-vicePresident';
                    roleText = 'Vice President';
                } else if (roleText === 'senior') {
                    roleClass = 'role-senior';
                    roleText = 'Senior';
                } else {
                    roleText = 'Member';
                }

                const playerData = member.playerData || {
                    totalPrestige: 0,
                    teamWins: 0,
                    showdownWins: 0,
                    ratio: '0'
                };

                // Bepaal ratio class
                let ratioClass = 'ratio-neutral';
                if (playerData.ratio !== '∞' && playerData.ratio !== '0') {
                    const ratioNum = parseFloat(playerData.ratio);
                    if (ratioNum >= 2) ratioClass = 'ratio-good';
                    else if (ratioNum >= 1) ratioClass = 'ratio-neutral';
                    else ratioClass = 'ratio-bad';
                }

                row.innerHTML = `
                    <td>${escapeHtml(member.name)}</td>
                    <td><span class="role-badge ${roleClass}">${roleText}</span></td>
                    <td>${member.trophies?.toLocaleString() || '0'}</td>
                    <td><span class="prestige-badge">${playerData.totalPrestige}</span></td>
                    <td>${playerData.teamWins?.toLocaleString() || '0'}</td>
                    <td>${playerData.showdownWins?.toLocaleString() || '0'}</td>
                    <td class="${ratioClass}">${playerData.ratio}</td>
                `;

                membersList.appendChild(row);
            });
        }

        // Sorteer leden
        function sortMembersArray(members, field, direction) {
            return [...members].sort((a, b) => {
                let aVal, bVal;

                if (field === 'trophies') {
                    aVal = a.trophies || 0;
                    bVal = b.trophies || 0;
                } else if (field === 'prestige') {
                    aVal = a.playerData?.totalPrestige || 0;
                    bVal = b.playerData?.totalPrestige || 0;
                } else if (field === 'ratio') {
                    const aRatio = a.playerData?.ratio || '0';
                    const bRatio = b.playerData?.ratio || '0';
                    
                    if (aRatio === '∞') aVal = 999999;
                    else if (aRatio === '0') aVal = 0;
                    else aVal = parseFloat(aRatio);
                    
                    if (bRatio === '∞') bVal = 999999;
                    else if (bRatio === '0') bVal = 0;
                    else bVal = parseFloat(bRatio);
                } else if (field === 'name') {
                    aVal = a.name || '';
                    bVal = b.name || '';
                    return direction === 'asc' 
                        ? aVal.localeCompare(bVal)
                        : bVal.localeCompare(aVal);
                } else if (field === 'role') {
                    const roleOrder = { 'president': 4, 'vicePresident': 3, 'senior': 2, 'member': 1 };
                    aVal = roleOrder[a.role] || 0;
                    bVal = roleOrder[b.role] || 0;
                } else if (field === '3vs3') {
                    aVal = a.playerData?.teamWins || 0;
                    bVal = b.playerData?.teamWins || 0;
                } else if (field === 'sd') {
                    aVal = a.playerData?.showdownWins || 0;
                    bVal = b.playerData?.showdownWins || 0;
                }

                if (direction === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });
        }

        // Leden sorteren (vanuit UI)
        function sortMembers(field) {
            // Update active button
            document.querySelectorAll('.member-sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Toggle direction if same field
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'desc';
            }

            displayMembers(currentMembers);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Initialize
        displayClubs();
    </script>
</body>
</html>
