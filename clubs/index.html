<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealDutch • Club Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e67e22;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #cc4125;
            border-radius: 28px;
            padding: 24px;
        }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand h1 { font-size: 3rem; color: #ffd966; font-family: Georgia, serif; }
        .brand h2 { font-size: 1rem; color: #ffd966; margin-top: -8px; }
        .last-updated { text-align: center; color: #ffdca8; font-size: 0.7rem; margin-bottom: 20px; }
        .club-selector { margin-bottom: 24px; }
        .club-dropdown {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            background: #ffefcf;
            border: 2px solid #ffd966;
            border-radius: 60px;
            color: #5a2412;
            cursor: pointer;
            font-weight: 600;
        }
        .detail-panel { background: #b33c21; border-radius: 24px; padding: 20px; }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detail-club-name { font-size: 1.8rem; font-weight: bold; color: #ffefbf; }
        .detail-tag { background: #8b2c16; padding: 5px 14px; border-radius: 40px; color: #ffdeae; font-family: monospace; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #9e351d;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: #ffd966; }
        .stat-label { font-size: 0.7rem; color: #ffdeae; text-transform: uppercase; }
        .members-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .members-header h3 { color: #ffd966; font-size: 1.2rem; }
        .member-count { background: #662211; padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; color: #ffdeae; }
        .sort-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
        .sort-btn {
            background: #af401f;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffecb3;
            cursor: pointer;
        }
        .sort-btn.active { background: #ffd966; color: #611f0c; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #882e16a0;
            font-size: 0.75rem;
        }
        th, td { padding: 10px 8px; text-align: left; color: #fff0cf; }
        th { background: #63200e; color: #ffdeae; cursor: pointer; }
        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .role-president { background: #c0392b; color: #ffd966; }
        .role-vicePresident { background: #e67e22; color: #2c0f05; }
        .role-senior { background: #9b59b6; color: #f3e5ab; }
        .role-member { background: #2c6e9e; color: white; }
        .prestige-badge {
            background: #f1c40f;
            color: #5a1e0b;
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.7rem;
            display: inline-block;
        }
        .discord-cell {
            cursor: pointer;
            transition: 0.2s;
        }
        .discord-cell:hover {
            opacity: 0.7;
            transform: scale(1.02);
        }
        .discord-yes { 
            background: #2e7d32; 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 20px; 
            display: inline-block;
            font-weight: bold;
        }
        .discord-no { 
            background: #c62828; 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 20px; 
            display: inline-block;
            font-weight: bold;
        }
        .discord-edit {
            background: #ffd966;
            color: #5a2412;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.6rem;
            margin-left: 8px;
        }
        .loading, .error { text-align: center; padding: 40px; background: #c24a2a; border-radius: 24px; color: #ffdca8; }
        .hidden { display: none; }
        .refresh-btn, .save-btn {
            background: #ffd966;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #5a2412;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #cc4125;
            padding: 24px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        .modal-content button {
            padding: 10px 20px;
            margin: 5px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .note {
            background: #662211;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.7rem;
            color: #ffdeae;
        }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 0.65rem; padding: 6px 4px; }
        }
        /* Al je bestaande CSS blijft */
        .kicklist-cell {
            cursor: pointer;
            transition: 0.2s;
        }
        .kicklist-cell:hover {
            opacity: 0.7;
            transform: scale(1.02);
        }
        .kicklist-yes { 
            background: #f39c12; 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 20px; 
            display: inline-block;
            font-weight: bold;
        }
        .kicklist-no { 
            background: #2c3e50; 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 20px; 
            display: inline-block;
            font-weight: bold;
        }
        .kicklist-edit {
            background: #ffd966;
            color: #5a2412;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.6rem;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>RealDutch</h1>
        <h2>Brawl Stars • Club Statistics</h2>
    </div>
    
    <div class="note">
    📊 Data live van RealDutch server | Laatste update: <span id="updateTime"></span> | Klik op Discord of Kicklist om aan te passen
</div>
    
    <div id="lastUpdated" class="last-updated"></div>
    
    <div style="display: flex; justify-content: flex-end; margin-bottom: 16px; gap: 10px;">
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        <button class="save-btn" onclick="updateStats()">📡 Update Prestige/Wins</button>
    </div>
    
    <div class="club-selector">
        <select id="clubDropdown" class="club-dropdown">
            <option value="">-- Select a club --</option>
        </select>
    </div>
    
    <div id="loading" class="loading hidden">⏳ Loading...</div>
    <div id="error" class="error hidden"></div>
    
    <div id="detailPanel" class="detail-panel hidden">
        <!-- je bestaande detail panel -->
    </div>
</div>

<script>
    const API_BASE = 'https://api.realdutch.club';
    const STATS_URL = 'https://json.realdutch.club/clubs-data.json';
    const SECRET_TOKEN = 'realdutch-secret-2024';
    
    let clubsData = null;      // stats data (prestige, wins, discord, kicklist)
    let currentClub = null;
    let currentSort = { field: 'trophies', dir: 'desc' };
    
    // Live club data ophalen (ledenlijst)
    async function fetchLiveClub(tag) {
        const response = await fetch(`${API_BASE}/api/club?tag=${tag}`);
        return await response.json();
    }
    
    // Stats ophalen (prestige, wins, discord, kicklist)
    async function fetchStats() {
        const response = await fetch(STATS_URL);
        return await response.json();
    }
    
    // Combine live club data met stats
    async function loadData() {
        document.getElementById('loading').classList.remove('hidden');
        
        try {
            // Haal stats op
            const stats = await fetchStats();
            clubsData = stats;
            
            document.getElementById('updateTime').textContent = new Date(stats.lastUpdated).toLocaleString();
            document.getElementById('lastUpdated').innerHTML = `📅 Stats last updated: ${new Date(stats.lastUpdated).toLocaleString()}`;
            
            // Maak dropdown
            const dropdown = document.getElementById('clubDropdown');
            dropdown.innerHTML = '<option value="">-- Select a club --</option>';
            stats.clubs.forEach(club => {
                const option = document.createElement('option');
                option.value = club.tag;
                option.textContent = `${club.name}`;
                dropdown.appendChild(option);
            });
            
            document.getElementById('loading').classList.add('hidden');
        } catch (err) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error').innerHTML = `❌ Error: ${err.message}`;
        }
    }
    
    // Update alleen prestige/wins stats (niet de ledenlijst)
    async function updateStats() {
        if (!confirm('Update prestige/wins stats? (takes 2-3 min)')) return;
        document.getElementById('loading').classList.remove('hidden');
        
        try {
            const response = await fetch(`${API_BASE}/api/update-clubs?token=${SECRET_TOKEN}`);
            const result = await response.json();
            if (result.success) {
                await loadData();
                if (currentClub) {
                    selectClub(currentClub.tag);
                }
                alert('✅ Stats updated!');
            }
        } catch (err) {
            alert('❌ Update failed');
        }
        document.getElementById('loading').classList.add('hidden');
    }
    
    // Selecteer club - haalt LIVE ledenlijst op
    async function selectClub(tag) {
        document.getElementById('loading').classList.remove('hidden');
        
        try {
            // Haal live club data op (snelle API)
            const liveClub = await fetchLiveClub(tag);
            
            // Zoek stats voor deze club
            const statsClub = clubsData?.clubs?.find(c => c.tag === tag);
            
            // Combineer: ledenlijst van live, stats van JSON
            const members = liveClub.members.map(member => {
                const statsMember = statsClub?.members?.find(sm => sm.tag === member.tag);
                return {
                    name: member.name,
                    tag: member.tag,
                    role: member.role,
                    trophies: member.trophies,
                    prestige: statsMember?.prestige || 0,
                    teamWins: statsMember?.teamWins || 0,
                    showdownWins: statsMember?.showdownWins || 0,
                    ratio: statsMember?.ratio || '0',
                    inDiscord: statsMember?.inDiscord || false,
                    discordName: statsMember?.discordName || null,
                    onKickList: statsMember?.onKickList || false
                };
            });
            
            currentClub = {
                name: liveClub.name,
                tag: liveClub.tag,
                totalTrophies: liveClub.trophies,
                requiredTrophies: liveClub.requiredTrophies || 0,
                members: members
            };
            
            // Update UI
            document.getElementById('clubName').textContent = currentClub.name;
            document.getElementById('clubTag').textContent = `#${currentClub.tag}`;
            document.getElementById('totalTrophies').textContent = currentClub.totalTrophies.toLocaleString();
            document.getElementById('requiredTrophies').textContent = currentClub.requiredTrophies.toLocaleString();
            document.getElementById('memberCount').textContent = currentClub.members.length;
            document.getElementById('memberCountDisplay').textContent = `${currentClub.members.length} members`;
            
            const avg = Math.round(currentClub.totalTrophies / currentClub.members.length);
            document.getElementById('avgTrophies').textContent = avg.toLocaleString();
            
            displayMembers();
            document.getElementById('detailPanel').classList.remove('hidden');
            
        } catch (err) {
            console.error(err);
            alert('Error loading club');
        }
        
        document.getElementById('loading').classList.add('hidden');
    }
    
    function displayMembers() {
        // je bestaande displayMembers functie
    }
    
    // Discord en Kicklist update functies blijven hetzelfde
    async function updateDiscordStatus(tag, inDiscord, discordName) {
        // ... bestaande code
    }
    
    async function updateKicklistStatus(tag, onKickList) {
        // ... bestaande code
    }
    
    // Event listeners
    document.getElementById('clubDropdown').addEventListener('change', (e) => {
        if (e.target.value) selectClub(e.target.value);
    });
    
    loadData();
</script>
</body>
</html>
