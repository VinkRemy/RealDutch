<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RealDutch • Club Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e67e22;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #cc4125;
            border-radius: 28px;
            padding: 24px;
        }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand h1 { font-size: 3rem; color: #ffd966; font-family: Georgia, serif; }
        .brand h2 { font-size: 1rem; color: #ffd966; margin-top: -8px; }
        .last-updated { text-align: center; color: #ffdca8; font-size: 0.7rem; margin-bottom: 20px; }
        .club-selector { margin-bottom: 24px; }
        .club-dropdown {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            background: #ffefcf;
            border: 2px solid #ffd966;
            border-radius: 60px;
            color: #5a2412;
            cursor: pointer;
            font-weight: 600;
        }
        .detail-panel { background: #b33c21; border-radius: 24px; padding: 20px; }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detail-club-name { font-size: 1.8rem; font-weight: bold; color: #ffefbf; }
        .detail-tag { background: #8b2c16; padding: 5px 14px; border-radius: 40px; color: #ffdeae; font-family: monospace; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #9e351d;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: #ffd966; }
        .stat-label { font-size: 0.7rem; color: #ffdeae; text-transform: uppercase; }
        .members-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .members-header h3 { color: #ffd966; font-size: 1.2rem; }
        .member-count { background: #662211; padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; color: #ffdeae; }
        .sort-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
        .sort-btn {
            background: #af401f;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffecb3;
            cursor: pointer;
        }
        .sort-btn.active { background: #ffd966; color: #611f0c; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #882e16a0;
            font-size: 0.75rem;
        }
        th, td { padding: 10px 8px; text-align: left; color: #fff0cf; }
        th { background: #63200e; color: #ffdeae; cursor: pointer; }
        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .role-president { background: #c0392b; color: #ffd966; }
        .role-vicePresident { background: #e67e22; color: #2c0f05; }
        .role-senior { background: #9b59b6; color: #f3e5ab; }
        .role-member { background: #2c6e9e; color: white; }
        .prestige-badge {
            background: #f1c40f;
            color: #5a1e0b;
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.7rem;
            display: inline-block;
        }
        .discord-yes { color: #b9f6ca; font-weight: bold; }
        .discord-no { color: #ffab91; }
        .loading, .error { text-align: center; padding: 40px; background: #c24a2a; border-radius: 24px; color: #ffdca8; }
        .hidden { display: none; }
        .refresh-btn {
            background: #ffd966;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #5a2412;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 0.65rem; padding: 6px 4px; }
        }
        .note {
            background: #662211;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.7rem;
            color: #ffdeae;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>RealDutch</h1>
        <h2>Brawl Stars • Club Statistics</h2>
    </div>
    
    <div class="note">
        📊 Data live van RealDutch server | Laatste update: <span id="updateTime"></span>
    </div>
    
    <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    </div>
    
    <div class="club-selector">
        <select id="clubDropdown" class="club-dropdown">
            <option value="">-- Select a club --</option>
        </select>
    </div>
    
    <div id="loading" class="loading hidden">⏳ Loading club data...</div>
    <div id="error" class="error hidden"></div>
    
    <div id="detailPanel" class="detail-panel hidden">
        <div class="detail-header">
            <div class="detail-club-name" id="clubName">-</div>
            <span class="detail-tag" id="clubTag"></span>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalTrophies">0</div><div class="stat-label">Total Trophies</div></div>
            <div class="stat-card"><div class="stat-value" id="requiredTrophies">0</div><div class="stat-label">Required</div></div>
            <div class="stat-card"><div class="stat-value" id="memberCount">0</div><div class="stat-label">Members</div></div>
            <div class="stat-card"><div class="stat-value" id="avgTrophies">0</div><div class="stat-label">Avg Trophies</div></div>
        </div>
        
        <div class="members-header">
            <h3>👥 Member Stats</h3>
            <span id="memberCountDisplay" class="member-count"></span>
            <div class="sort-buttons">
                <button class="sort-btn" data-sort="trophies">🏆 Trophies</button>
                <button class="sort-btn" data-sort="prestige">⭐ Prestige</button>
                <button class="sort-btn" data-sort="ratio">📊 Ratio</button>
                <button class="sort-btn" data-sort="name">Name</button>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="membersTable">
                <thead>
                    <tr><th>Name</th><th>Role</th><th>🏆 Trophies</th><th>⭐ Prestige</th><th>3v3 Wins</th><th>SD Wins</th><th>Ratio</th><th>Discord</th>
                </thead>
                <tbody id="membersList"></tbody>
             </table>
        </div>
    </div>
</div>

<script>
    // JSON bestand van je server
    const DATA_URL = 'http://217.154.80.74/clubs/data/clubs-data.json';
    let clubsData = null;
    let currentClub = null;
    let currentSort = { field: 'trophies', dir: 'desc' };
    
    async function loadData() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('detailPanel').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
        
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            clubsData = await response.json();
            
            document.getElementById('updateTime').textContent = new Date(clubsData.lastUpdated).toLocaleString();
            document.getElementById('lastUpdated').innerHTML = `📅 Last updated: ${new Date(clubsData.lastUpdated).toLocaleString()}`;
            
            const dropdown = document.getElementById('clubDropdown');
            dropdown.innerHTML = '<option value="">-- Select a club --</option>';
            clubsData.clubs.forEach(club => {
                const option = document.createElement('option');
                option.value = club.tag;
                option.textContent = `${club.name} (${club.members.length} members)`;
                dropdown.appendChild(option);
            });
            
            document.getElementById('loading').classList.add('hidden');
        } catch (err) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error').innerHTML = `❌ Error loading data: ${err.message}<br><br>Make sure the server is running: ${DATA_URL}`;
        }
    }
    
    function selectClub(tag) {
        currentClub = clubsData.clubs.find(c => c.tag === tag);
        if (!currentClub) return;
        
        document.getElementById('clubName').textContent = currentClub.name;
        document.getElementById('clubTag').textContent = `#${currentClub.tag}`;
        document.getElementById('totalTrophies').textContent = currentClub.totalTrophies.toLocaleString();
        document.getElementById('requiredTrophies').textContent = currentClub.requiredTrophies.toLocaleString();
        document.getElementById('memberCount').textContent = currentClub.members.length;
        document.getElementById('memberCountDisplay').textContent = `${currentClub.members.length} members`;
        
        const avg = Math.round(currentClub.totalTrophies / currentClub.members.length);
        document.getElementById('avgTrophies').textContent = avg.toLocaleString();
        
        displayMembers();
        document.getElementById('detailPanel').classList.remove('hidden');
    }
    
    function displayMembers() {
        if (!currentClub) return;
        
        const sorted = [...currentClub.members].sort((a, b) => {
            let aVal, bVal;
            if (currentSort.field === 'trophies') { aVal = a.trophies; bVal = b.trophies; }
            else if (currentSort.field === 'prestige') { aVal = a.prestige; bVal = b.prestige; }
            else if (currentSort.field === 'ratio') { 
                aVal = a.ratio === '∞' ? 999999 : parseFloat(a.ratio) || 0;
                bVal = b.ratio === '∞' ? 999999 : parseFloat(b.ratio) || 0;
            }
            else { aVal = a.name; bVal = b.name; }
            
            if (currentSort.field === 'name') {
                return currentSort.dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            }
            return currentSort.dir === 'asc' ? aVal - bVal : bVal - aVal;
        });
        
        const tbody = document.getElementById('membersList');
        tbody.innerHTML = sorted.map(m => {
            const roleNames = { president: 'President', vicePresident: 'Vice Pres', senior: 'Senior', member: 'Member' };
            const roleClass = `role-${m.role}`;
            
            let ratioClass = 'ratio-neutral';
            if (m.ratio === '∞') ratioClass = 'ratio-perfect';
            else { let r = parseFloat(m.ratio); if (r >= 2) ratioClass = 'ratio-good'; else if (r < 1 && r > 0) ratioClass = 'ratio-bad'; }
            
            return `
            <tr>
                <td>${escapeHtml(m.name)}</td>
                <td><span class="role-badge ${roleClass}">${roleNames[m.role] || 'Member'}</span></td>
                <td>${m.trophies.toLocaleString()}</td>
                <td><span class="prestige-badge">${m.prestige}</span></td>
                <td>${m.teamWins.toLocaleString()}</td>
                <td>${m.showdownWins.toLocaleString()}</td>
                <td class="${ratioClass}">${m.ratio}</td>
                <td class="${m.inDiscord ? 'discord-yes' : 'discord-no'}">${m.inDiscord ? (m.discordName ? `✓ ${m.discordName}` : '✓ In Discord') : '✗ Not in Discord'}</td>
            </tr>`;
        }).join('');
        
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.sort === currentSort.field) btn.classList.add('active');
        });
    }
    
    function sortMembers(field) {
        if (currentSort.field === field) {
            currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.field = field;
            currentSort.dir = 'desc';
        }
        displayMembers();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('clubDropdown').addEventListener('change', (e) => {
        if (e.target.value) selectClub(e.target.value);
    });
    
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => sortMembers(btn.dataset.sort));
    });
    
    // Load on page load
    loadData();
</script>
</body>
</html>
