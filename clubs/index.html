<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Speler Profiel - RealDutch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0B1026, #1A1F3D);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #8892b0;
        }

        .search-box button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            color: #0B1026;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading-spinner {
            border: 4px solid rgba(255,215,0,0.1);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        /* Profiel Header */
        .profile-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            display: none;
        }

        .player-name-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .player-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .player-title {
            flex: 1;
        }

        .player-name {
            font-size: 2.5rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .player-tag {
            font-family: monospace;
            color: #FFD700;
            background: rgba(255,215,0,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
        }

        .player-name-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }

        .player-club {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .player-club a {
            color: #FFD700;
            text-decoration: none;
        }

        .player-club a:hover {
            text-decoration: underline;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #8892b0;
            font-size: 0.9rem;
        }

        /* Victory Stats */
        .victory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .victory-card {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .victory-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .victory-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: none;
            border: none;
            color: #8892b0;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,215,0,0.1);
            color: white;
        }

        .tab-btn.active {
            background: rgba(255,215,0,0.2);
            color: #FFD700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Brawlers Grid */
        .brawlers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .brawler-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .brawler-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
        }

        .brawler-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brawler-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD700;
        }

        .brawler-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }

        .brawler-stat {
            text-align: center;
        }

        .stat-highlight {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        .prestige-badge {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: white;
        }

        .items-section {
            margin-top: 15px;
        }

        .items-title {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .items-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-tag {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .item-tag.hypercharge {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .item-tag.starpower {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .item-tag.gadget {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .item-tag.gear {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .gear-level {
            background: #FFD700;
            color: #0B1026;
            border-radius: 10px;
            padding: 2px 6px;
            font-weight: bold;
        }

        .buff-icons {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .buff-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .buff-gadget { background: #3498db; }
        .buff-starpower { background: #9b59b6; }
        .buff-hypercharge { background: #e74c3c; }

        /* Battle Log */
        .battle-log {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .battle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .battle-item:last-child {
            border-bottom: none;
        }

        .battle-result {
            font-weight: bold;
        }

        .victory { color: #2ecc71; }
        .defeat { color: #e74c3c; }
        .draw { color: #f39c12; }

        @media (max-width: 768px) {
            .player-name { font-size: 1.8rem; }
            .brawlers-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Brawl Stars Speler Profiel</h1>
        </header>

        <div class="search-box">
            <input type="text" id="playerTag" placeholder="Speler tag (zonder #), bijv: L2P2LQRJ" value="L2P2LQRJ">
            <button onclick="searchPlayer()">Zoeken</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Speler gegevens laden...</p>
        </div>

        <div class="error-message" id="error"></div>

        <!-- Profiel Header -->
        <div class="profile-header" id="profileHeader">
            <div class="player-name-section">
                <div class="player-icon" id="playerIcon">👤</div>
                <div class="player-title">
                    <div class="player-name">
                        <span id="playerName"></span>
                        <span class="player-name-color" id="nameColor"></span>
                        <span class="player-tag" id="playerTagDisplay"></span>
                    </div>
                    <div class="player-club" id="playerClub"></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="trophies">0</div>
                    <div class="stat-label">Huidige Trophies</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="highestTrophies">0</div>
                    <div class="stat-label">Hoogste Trophies</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="expLevel">0</div>
                    <div class="stat-label">Experience Level</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalPrestige">0</div>
                    <div class="stat-label">Totaal Prestige</div>
                </div>
            </div>

            <div class="victory-grid">
                <div class="victory-card">
                    <div class="victory-value" id="soloWins">0</div>
                    <div class="victory-label">Solo Wins</div>
                </div>
                <div class="victory-card">
                    <div class="victory-value" id="duoWins">0</div>
                    <div class="victory-label">Duo Wins</div>
                </div>
                <div class="victory-card">
                    <div class="victory-value" id="teamWins">0</div>
                    <div class="victory-label">3v3 Wins</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('brawlers')">Brawlers</button>
                <button class="tab-btn" onclick="showTab('battlelog')">Battle Log</button>
                <button class="tab-btn" onclick="showTab('stats')">Stats</button>
            </div>

            <!-- Brawlers Tab -->
            <div class="tab-content active" id="tabBrawlers">
                <div class="brawlers-grid" id="brawlersList"></div>
            </div>

            <!-- Battle Log Tab -->
            <div class="tab-content" id="tabBattlelog">
                <div class="battle-log" id="battlelogList">
                    <p style="text-align: center; color: #8892b0;">Laad battle log...</p>
                </div>
            </div>

            <!-- Stats Tab -->
            <div class="tab-content" id="tabStats">
                <div class="stats-grid" id="additionalStats"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.realdutch.club';

        async function searchPlayer() {
            const tag = document.getElementById('playerTag').value.trim();
            
            if (!tag) {
                showError('Voer een speler tag in');
                return;
            }

            showLoading();
            hideProfile();

            try {
                // Haal speler data op
                const playerResponse = await fetch(`${API_BASE}/api/player?tag=${tag}`);
                const playerData = await playerResponse.json();

                if (!playerResponse.ok) {
                    throw new Error(playerData.error || 'Speler niet gevonden');
                }

                // Toon profiel
                displayPlayerProfile(playerData);
                
                // Haal battle log op
                fetchBattleLog(tag);
                
                hideLoading();

            } catch (error) {
                hideLoading();
                showError('Fout bij ophalen: ' + error.message);
            }
        }

        function displayPlayerProfile(data) {
            console.log('Player data:', data); // Voor debugging

            // Basis info
            document.getElementById('playerName').textContent = data.name || 'Onbekend';
            document.getElementById('playerTagDisplay').textContent = `#${data.tag || ''}`;
            
            // Naamkleur
            if (data.nameColor) {
                const colorBox = document.getElementById('nameColor');
                colorBox.style.background = data.nameColor.replace('0x', '#');
                colorBox.style.display = 'inline-block';
            }

            // Club
            const clubEl = document.getElementById('playerClub');
            if (data.club) {
                clubEl.innerHTML = `Club: <a href="#" onclick="searchClub('${data.club.tag}')">${data.club.name}</a>`;
            } else {
                clubEl.textContent = 'Geen club';
            }

            // Stats
            document.getElementById('trophies').textContent = data.trophies?.toLocaleString() || '0';
            document.getElementById('highestTrophies').textContent = data.highestTrophies?.toLocaleString() || '0';
            document.getElementById('expLevel').textContent = data.expLevel || '0';
            document.getElementById('totalPrestige').textContent = data.totalPrestigeLevel || '0';
            
            // Victory stats
            document.getElementById('soloWins').textContent = data.soloVictories?.toLocaleString() || '0';
            document.getElementById('duoWins').textContent = data.duoVictories?.toLocaleString() || '0';
            document.getElementById('teamWins').textContent = data['3vs3Victories']?.toLocaleString() || '0';

            // Brawlers
            displayBrawlers(data.brawlers || []);

            // Additional stats
            displayAdditionalStats(data);

            // Toon profiel
            document.getElementById('profileHeader').style.display = 'block';
        }

        function displayBrawlers(brawlers) {
            const container = document.getElementById('brawlersList');
            container.innerHTML = '';

            // Sorteer op trophies
            brawlers.sort((a, b) => b.trophies - a.trophies);

            brawlers.forEach(brawler => {
                const card = document.createElement('div');
                card.className = 'brawler-card';

                // Bepaal buff icons
                const buffs = [];
                if (brawler.buffies) {
                    if (brawler.buffies.gadget) buffs.push('gadget');
                    if (brawler.buffies.starPower) buffs.push('starpower');
                    if (brawler.buffies.hyperCharge) buffs.push('hypercharge');
                }

                // Hypercharges
                const hyperCharges = brawler.hyperCharges || [];
                
                // Star Powers
                const starPowers = brawler.starPowers || [];
                
                // Gadgets
                const gadgets = brawler.gadgets || [];
                
                // Gears
                const gears = brawler.gears || [];

                card.innerHTML = `
                    <div class="brawler-header">
                        <span class="brawler-name">${brawler.name || 'Onbekend'}</span>
                        <div class="brawler-stats">
                            <div class="brawler-stat">
                                <div class="stat-highlight">${brawler.trophies || 0}</div>
                                <div style="font-size:0.7rem;">🏆</div>
                            </div>
                            <div class="brawler-stat">
                                <div class="stat-highlight">${brawler.rank || 0}</div>
                                <div style="font-size:0.7rem;">⭐</div>
                            </div>
                            <div class="brawler-stat">
                                <div class="stat-highlight">${brawler.power || 0}</div>
                                <div style="font-size:0.7rem;">🔋</div>
                            </div>
                        </div>
                    </div>

                    ${brawler.prestigeLevel ? `
                        <div style="margin-bottom:10px;">
                            <span class="prestige-badge">Prestige ${brawler.prestigeLevel}</span>
                        </div>
                    ` : ''}

                    ${buffs.length > 0 ? `
                        <div class="items-section">
                            <div class="items-title">⚡ Buffs</div>
                            <div class="buff-icons">
                                ${buffs.includes('gadget') ? '<div class="buff-icon buff-gadget" title="Gadget">G</div>' : ''}
                                ${buffs.includes('starpower') ? '<div class="buff-icon buff-starpower" title="Star Power">SP</div>' : ''}
                                ${buffs.includes('hypercharge') ? '<div class="buff-icon buff-hypercharge" title="Hypercharge">HC</div>' : ''}
                            </div>
                        </div>
                    ` : ''}

                    ${gadgets.length > 0 ? `
                        <div class="items-section">
                            <div class="items-title">🛠️ Gadgets</div>
                            <div class="items-grid">
                                ${gadgets.map(g => `
                                    <span class="item-tag gadget" title="${g.name}">${g.name}</span>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${starPowers.length > 0 ? `
                        <div class="items-section">
                            <div class="items-title">⭐ Star Powers</div>
                            <div class="items-grid">
                                ${starPowers.map(sp => `
                                    <span class="item-tag starpower" title="${sp.name}">${sp.name}</span>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${hyperCharges.length > 0 ? `
                        <div class="items-section">
                            <div class="items-title">⚡ Hypercharges</div>
                            <div class="items-grid">
                                ${hyperCharges.map(hc => `
                                    <span class="item-tag hypercharge" title="${hc.name}">${hc.name}</span>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${gears.length > 0 ? `
                        <div class="items-section">
                            <div class="items-title">⚙️ Gears</div>
                            <div class="items-grid">
                                ${gears.map(g => `
                                    <span class="item-tag gear">
                                        ${g.name} <span class="gear-level">${g.level}</span>
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${brawler.currentWinStreak > 0 ? `
                        <div style="margin-top:10px; color:#2ecc71;">
                            🔥 Win streak: ${brawler.currentWinStreak}
                        </div>
                    ` : ''}
                `;

                container.appendChild(card);
            });
        }

        function displayAdditionalStats(data) {
            const container = document.getElementById('additionalStats');
            container.innerHTML = '';

            const stats = [
                { label: 'Experience Points', value: data.expPoints?.toLocaleString() },
                { label: 'Best Robo Rumble', value: data.bestRoboRumbleTime + ' min' },
                { label: 'Best Big Brawler', value: data.bestTimeAsBigBrawler + ' min' },
                { label: 'Qualified for Championship', value: data.isQualifiedFromChampionshipChallenge ? '✅ Ja' : '❌ Nee' },
                { label: 'Totaal Brawlers', value: data.brawlers?.length || 0 }
            ];

            stats.forEach(stat => {
                if (stat.value) {
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.innerHTML = `
                        <div class="stat-value">${stat.value}</div>
                        <div class="stat-label">${stat.label}</div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        async function fetchBattleLog(tag) {
            try {
                const response = await fetch(`${API_BASE}/api/player/${tag}/battlelog`);
                const data = await response.json();
                
                displayBattleLog(data);
            } catch (error) {
                document.getElementById('battlelogList').innerHTML = '<p style="color:#e74c3c;">Kon battle log niet laden</p>';
            }
        }

        function displayBattleLog(data) {
            const container = document.getElementById('battlelogList');
            
            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#8892b0;">Geen recente gevechten</p>';
                return;
            }

            container.innerHTML = '';
            data.items.slice(0, 10).forEach(battle => {
                const battleItem = document.createElement('div');
                battleItem.className = 'battle-item';

                const result = battle.battle?.result || 'unknown';
                const resultClass = result === 'victory' ? 'victory' : result === 'defeat' ? 'defeat' : 'draw';
                const trophyChange = battle.battle?.trophyChange || 0;

                battleItem.innerHTML = `
                    <div>
                        <div>${battle.event?.map || 'Onbekend'} (${battle.event?.mode || 'Onbekend'})</div>
                        <div style="font-size:0.8rem; color:#8892b0;">
                            ${new Date(battle.battleTime).toLocaleString()}
                        </div>
                    </div>
                    <div>
                        <span class="battle-result ${resultClass}">${result}</span>
                        ${trophyChange ? `<span style="margin-left:10px;">${trophyChange > 0 ? '+' : ''}${trophyChange}</span>` : ''}
                    </div>
                `;

                container.appendChild(battleItem);
            });
        }

        function searchClub(tag) {
            document.getElementById('playerTag').value = tag;
            // Hier kun je later een club zoek functie toevoegen
            alert('Club zoeken: ' + tag);
        }

        function showTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideProfile() {
            document.getElementById('profileHeader').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }

        // Laad voorbeeld bij openen
        window.addEventListener('load', () => {
            searchPlayer();
        });
    </script>
</body>
</html>
